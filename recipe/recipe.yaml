schema_version: 1

context:
  version: "0.5.1"

package:
  name: flash-linear-attention
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flash-linear-attention/flash_linear_attention-${{ version }}.tar.gz
  sha256: 8840fd4c37de8b0612dc8fd493867f3d330672ba2f17c024a2ce37239634e247

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - fla-core ==${{ version }}
    - transformers

tests:
  - python:
      imports:
        - fla
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: Fast linear attention models and layers
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fla-org/flash-linear-attention

extra:
  recipe-maintainers:
    - chrisdeutsch
